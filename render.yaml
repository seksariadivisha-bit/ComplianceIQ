services:
  - type: web
    name: complianceiq
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DB_PATH
        value: /tmp/complianceiq.sqlite3
      - key: FLASK_DEBUG
        value: "0"
